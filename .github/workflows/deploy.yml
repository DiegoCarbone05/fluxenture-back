name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

# Required GitHub variables:
# - IMAGE_REPOSITORY (example: your-dockerhub-user/fluxenture-back)
#
# Required GitHub secrets:
# - DOCKERHUB_USERNAME
# - DOCKERHUB_TOKEN
# Runtime secrets used by the container:
# - FLUX_DB
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - GOOGLE_REFRESH_TOKEN
env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/fluxenture-back
  CONTAINER_NAME: fluxenture-back
  APP_PORT: "8080"
  CONTAINER_PORT: "8080"

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image
        run: |
          echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on EC2 Runner
    runs-on: self-hosted
    needs: build_and_push
    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull deployment image
        run: docker pull ${IMAGE_REPOSITORY}:latest

      - name: Replace application container
        run: |
          docker rm -f "${CONTAINER_NAME}" || true
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p "${APP_PORT}:${CONTAINER_PORT}" \
            -e PORT="${CONTAINER_PORT}" \
            -e FLUX_DB="${{ secrets.FLUX_DB }}" \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -e GOOGLE_REFRESH_TOKEN="${{ secrets.GOOGLE_REFRESH_TOKEN }}" \
            ${IMAGE_REPOSITORY}:latest

      - name: Cleanup unused images
        run: docker image prune -f
