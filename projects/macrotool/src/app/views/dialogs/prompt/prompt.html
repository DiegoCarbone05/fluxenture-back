<div class="prompt-container">
  <div class="text">
    <h2>{{data?.title}}</h2>
    <p>{{data?.desc}}</p>
  </div>
  <div class="buttons-container"> 
    <button matButton [mat-dialog-close]="false">Cancelar</button>
    <button matButton="filled" color="primary" [mat-dialog-close]="true" cdkFocusInitial>Aceptar</button>
  </div>
</div>
