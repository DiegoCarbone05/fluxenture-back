# Electron Builder Configuration
# https://www.electron.build/configuration/configuration

appId: com.fluxenture.app
productName: Fluxenture
copyright: Copyright © 2026

directories:
  output: dist-electron

files:
  - dist/fluxetnure/**/*
  - dist/electron/**/*
  - package.json

asar: true

# Windows NSIS Installer
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Fluxenture
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

# macOS DMG
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  icon: build/icon.ico

# Linux AppImage
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
